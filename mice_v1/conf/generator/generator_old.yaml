# conf/config.yaml

# --- 几何范围 ---
x_low: 2000
x_high: 2200
z_low: 2200
z_high: 2400

# --- 功能开关 ---
visualize: false
validate: true
distance_rule: "microns_gaussian_exp"  # 选项: "campagnola" 或 "microns_gaussian_exp"
target_ie_ratio: 0.7  # 目标 I/E 平衡比例

# --- 路径配置 (关键：避免硬编码) ---
save_dir: "./output_networks"

# BlueBrain 数据路径 (load_bbp_data_all 函数用)
bbp_data_path: "../mice_unnamed_new/data/bluebrain/"

# Microns 拟合参数路径
microns_json_path: "/home/liuxingyu/network_generator/results/distance_fitting_results/dist_probs_gauss_exp.json"
microns_degree_path: "/home/liuxingyu/network_generator/results/degree_fitting_results/microns_fitted_params.json"

weight_distributions:
  ee_weight_mean: 200      # E->E 连接权重的均值
  ee_weight_sigma: 10     # E->E 连接权重的方差/标准差
  ei_weight_mean: 200     # E->I
  ei_weight_sigma: 10
  ii_weight_mean: 44      # I->I
  ii_weight_sigma: 10

#trial_id: "default"