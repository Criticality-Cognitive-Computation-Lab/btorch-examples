# conf/config.yaml

# --- 运行模式 ---
# build: 从头构建网络，并可选地保存 bundle 和运行验证
# load: 从指定的 bundle_path 加载网络，并可选地运行验证
run_mode: "build"

# --- 功能开关 ---
visualize: true
validate: true

# --- 路径配置 (关键：避免硬编码) ---
save_dir: "./output_networks"

# BlueBrain 数据路径 (load_bbp_data_all 函数用)
bbp_data_path: "../mice_unnamed_new/data/bluebrain/"

# Microns 拟合参数路径
microns_json_path: "/home/liuxingyu/network_generator/results/distance_fitting_results/dist_probs_gauss_exp.json"
microns_degree_path: "/home/liuxingyu/network_generator/results/degree_fitting_results/microns_fitted_params.json"

# --- 网络生成参数 ---
distance_rule: "microns_gaussian_exp"  # 选项: "campagnola" 或 "microns_gaussian_exp"
target_ie_ratio: 0.5  # 目标 I/E 平衡比例

# --- 几何范围 ---
x_low: 2000
x_high: 2200
z_low: 2200
z_high: 2400

# --- 权重分布 & 分配规则 ---
# weight_rules 控制每类连接的分配方式:
#   - inverse_pool: 逆池化 (lognormal pool)
#   - ie_ratio: I->E 使用 IE 比例耦合
# 也可以指定 strategy:
#   - ee_inverse_pool | ee_ei_inverse_pool | ee_ei_ii_inverse_pool
weight_rules:
  # strategy: zero_all
  strategy: ee_ei_ii_inverse_pool
  # ee: inverse_pool
  # ie: ie_ratio
  # ei: inverse_pool
  # ii: inverse_pool

# inverse_pool 所需的 lognormal 参数 (均值/标准差)
weight_distributions:
  ee_weight_mean: 90
  ee_weight_sigma: 10
  ei_weight_mean: 130
  ei_weight_sigma: 10
  ii_weight_mean: 200
  ii_weight_sigma: 10

# --- [新] build 模式选项 ---
save_bundle: true  # 是否在 build 模式下保存 network_bundle.pkl

# --- [新] load 模式选项 ---
# 示例路径，你需要根据实际生成的 bundle 路径修改
load_bundle_path: "./output_networks/x_2000_2100_z_2200_2300_Total_1050_HybridGu_uuid_cd463fa8/network_bundle.pkl"

# --- [新] validation 选项 ---
validate_print_summary: true  # 是否在验证时执行默认的 print_summarize_inputs_all_post_types
validate_max_neurons: null    # 验证时每类神经元采样的最大数量 (null=全部)
